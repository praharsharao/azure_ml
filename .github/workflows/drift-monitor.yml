name: Daily Data Drift Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  evaluate-drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      # NEW: Log into Azure so MLflow can send data to your workspace
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # NEW: Added mlflow, azure-ai-ml, and azure-identity
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scipy requests mlflow azure-ai-ml azure-identity

      - name: Run Drift Detector
        env:
          MY_GITHUB_PAT: ${{ secrets.MY_GITHUB_PAT }}
        run: python drift_detector.py
