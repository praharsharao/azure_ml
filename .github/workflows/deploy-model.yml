name: Train and Deploy Model (CI/CD)

on:
  push:
    branches: [ main ]
    paths:
      - 'train.py'
      - 'src/score.py'
      - 'conda.yml'
  repository_dispatch:
    types: [drift_alert_retrain]
  workflow_dispatch:

jobs:
  rebuild-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          
      - name: Install Dependencies & Azure CLI
        run: |
          python -m pip install --upgrade pip
          pip install azure-ai-ml azure-identity
          az extension add -n ml -y

      - name: Train and Deploy New Model
        run: |
          echo "🚀 Triggering Training Job..."
          python submit_v2.py
          
          echo "🌐 Updating Live API to Version 2..."
          python deploy.py

