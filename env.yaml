name: insurance_custom_env_v9
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - setuptools<70.0.0
      - mlflow==2.11.3
      - mlflow-skinny==2.11.3
      - azureml-mlflow
      - azure-identity
      - azure-common
      - azure-mgmt-core
      - azureml-inference-server-http   # REQUIRED: Boots up the API web server
      - scikit-learn
      - xgboost
      - pandas
      - numpy
      - joblib