name: insurance_custom_env_v6
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - setuptools
      - mlflow==2.11.3
      - mlflow-skinny==2.11.3    # This matching version is the key fix
      - azureml-mlflow
      - azure-identity
      - azure-mgmt-core
      - scikit-learn
      - xgboost
      - pandas
      - numpy
      - joblib