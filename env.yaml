name: insurance-cloud-env-v4
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - setuptools             # REQUIRED: Fixes the 'pkg_resources' crash
      - mlflow==2.11.3
      - mlflow-skinny==2.11.3
      - azureml-mlflow         # Essential for workspace tracking
      - azure-identity         # Fixes 'azure.profiles' warnings
      - azure-mgmt-resource    # Fixes 'azure.profiles' warnings
      - numpy==1.26.4
      - pandas==2.2.2
      - scikit-learn
      - xgboost
      - joblib