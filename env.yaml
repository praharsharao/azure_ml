name: insurance-cloud-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - setuptools             # Fixes 'pkg_resources' error
      - mlflow==2.11.3
      - mlflow-skinny==2.11.3
      - azureml-mlflow         # Essential for the 'azureml' scheme
      - azure-identity         # Fixes 'azure.profiles' warning
      - azure-mgmt-resource    # Fixes 'azure.profiles' warning
      - numpy==1.26.4
      - pandas==2.2.2
      - scikit-learn
      - xgboost
      - joblib