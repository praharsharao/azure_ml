name: insurance_custom_env_v8
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - setuptools<70.0.0
      - mlflow==2.11.3
      - mlflow-skinny==2.11.3
      - azureml-mlflow
      - azure-identity
      - azure-common             # REQUIRED: Provides the missing 'azure.profiles' module
      - azure-mgmt-core
      - scikit-learn
      - xgboost
      - pandas
      - numpy
      - joblib